name: CI

# Runs unit tests + a production build on every push and PR, so a broken commit
# is caught before Vercel deploys it. Vercel does its own build on deploy; this is
# the extra quality gate.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        # Non-blocking for now: ESLint reports pre-existing react-hooks/purity +
        # set-state-in-effect errors in some admin components. Surfaced here so they're visible
        # without blocking deploys; drop `continue-on-error` to make it a hard gate once the
        # admin code-health pass clears them.
        run: npm run lint
        continue-on-error: true
      - name: Unit tests
        run: npm test
      - name: Production build
        run: |
          # Build-time placeholders so prerender doesn't need real Clerk keys.
          printf 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_%s\nCLERK_SECRET_KEY=sk_test_ci\n' \
            "$(printf 'foo.clerk.accounts.dev$' | base64)" > .env.local
          npm run build
